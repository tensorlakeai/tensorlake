name: TypeScript SDK Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to run the tests against"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

  pull_request:
    paths:
      - "typescript/**"
      - ".github/workflows/typescript_sdk.yaml"

  push:
    branches:
      - "main"
    paths:
      - "typescript/**"
      - ".github/workflows/typescript_sdk.yaml"

permissions:
  contents: read
  actions: read

defaults:
  run:
    working-directory: typescript

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-bin
          cache-bin: false

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Install Rust target
        run: rustup target add x86_64-unknown-linux-gnu x86_64-unknown-linux-musl

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

      - name: Run snapshot-focused SDK unit tests
        run: npm test -- tests/client.test.ts tests/sandbox-image.test.ts

      - name: Build native binding (glibc compatibility smoke)
        run: npm run build:native
        env:
          TENSORLAKE_NODE_TARGET_ID: linux-x64
          TENSORLAKE_NODE_TARGET_TRIPLE: x86_64-unknown-linux-gnu.2.28
          TENSORLAKE_NODE_BUILD_TOOL: cargo-zigbuild

      - name: Verify native glibc floor
        run: |
          set -euo pipefail
          binding="dist/native/linux-x64/tensorlake-node.node"
          required_versions="$(readelf --version-info "$binding" | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sort -Vu || true)"
          max_glibc="$(printf '%s\n' "$required_versions" | tail -n1)"
          echo "Maximum required glibc: ${max_glibc:-none}"
          if [ -n "$max_glibc" ] && [ "$(printf '%s\n%s\n' "GLIBC_2.28" "$max_glibc" | sort -V | tail -n1)" != "GLIBC_2.28" ]; then
            echo "Native binding requires $max_glibc, above the GLIBC_2.28 compatibility floor."
            exit 1
          fi

      - name: Build native binding (musl smoke)
        run: npm run build:native
        env:
          TENSORLAKE_NODE_TARGET_ID: linux-x64-musl
          TENSORLAKE_NODE_TARGET_TRIPLE: x86_64-unknown-linux-musl
          TENSORLAKE_NODE_BUILD_TOOL: cargo-zigbuild

      - name: Verify musl native binding does not require glibc
        run: |
          set -euo pipefail
          binding="dist/native/linux-x64-musl/tensorlake-node.node"
          required_versions="$(readelf --version-info "$binding" | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sort -Vu || true)"
          if [ -n "$required_versions" ]; then
            echo "Musl native binding unexpectedly references glibc symbols:"
            printf '%s\n' "$required_versions"
            exit 1
          fi

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'prod' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-bin
          cache-bin: false

      - name: Build native binding
        run: npm run build:native

      - name: Wait for Python sandbox integration
        if: github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          deadline=$((SECONDS + 1800))
          while [ "$SECONDS" -lt "$deadline" ]; do
            run_id=$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow tests.yaml \
              --json databaseId,headSha \
              --limit 20 \
              --jq ".[] | select(.headSha == \"$HEAD_SHA\") | .databaseId" \
              | head -n 1)

            if [ -n "$run_id" ]; then
              job=$(gh run view "$run_id" \
                --repo "$GITHUB_REPOSITORY" \
                --json jobs \
                --jq '.jobs[] | select(.name == "Sandbox integration tests") | "\(.status)\t\(.conclusion // "")"')
              status=$(printf '%s' "$job" | cut -f 1)
              conclusion=$(printf '%s' "$job" | cut -f 2)

              if [ "$status" = "completed" ] && [ "$conclusion" = "success" ]; then
                exit 0
              fi
              if [ "$status" = "completed" ]; then
                echo "Sandbox integration tests completed with conclusion: $conclusion"
                exit 1
              fi
            fi

            sleep 15
          done

          echo "Timed out waiting for Sandbox integration tests"
          exit 1

      - name: Run integration tests
        run: npm run test:integration
        env:
          TENSORLAKE_API_URL: ${{ secrets.TENSORLAKE_API_URL }}
          TENSORLAKE_API_KEY: ${{ secrets.TENSORLAKE_API_KEY }}
          TENSORLAKE_TEST_CLEANUP_ALL: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev') && '1' || '0' }}
          TENSORLAKE_TEST_CLEANUP_GRACE_SECS: "60"
