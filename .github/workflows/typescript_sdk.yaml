name: TypeScript SDK Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to run the tests against"
        required: true
        default: prod
        type: choice
        options:
          - dev
          - prod

  pull_request:
    paths:
      - "typescript/**"
      - ".github/workflows/typescript_sdk.yaml"

  push:
    branches:
      - "main"
    paths:
      - "typescript/**"
      - ".github/workflows/typescript_sdk.yaml"

permissions:
  contents: read

defaults:
  run:
    working-directory: typescript

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'prod' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration
        env:
          TENSORLAKE_API_URL: ${{ secrets.TENSORLAKE_API_URL }}
          TENSORLAKE_API_KEY: ${{ secrets.TENSORLAKE_API_KEY }}
