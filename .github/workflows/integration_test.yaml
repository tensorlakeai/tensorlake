name: Integration test against TestPyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version of Tensorlake to test
        required: true
  workflow_call:
    inputs:
      version:
        description: Version of Tensorlake to test
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  integration-test:
    name: Integration test against TestPyPI
    environment: prod
    runs-on: ubuntu-latest
    steps:
      - name: Write test application
        run: |
          SUFFIX=$(openssl rand -hex 6)
          echo "HEADER_APP_NAME=request_headers_${SUFFIX}" >> "$GITHUB_ENV"
          cat > /tmp/test_app.py << EOF
          import json

          from tensorlake.applications import Image, RequestContext, application, function

          image = Image(name="test-image-${SUFFIX}", base_image="python:3.11-slim")

          @application()
          @function(image=image)
          def hello_${SUFFIX}(name: str) -> str:
              return f"Hello, {name}!"

          @application(allow=["unauthorized_requests"])
          @function(image=image)
          def request_headers_${SUFFIX}(_: str) -> str:
              headers = RequestContext.get().headers
              return json.dumps(
                  {
                      "custom_header": headers["X-INTEGRATION-TEST"],
                      "custom_header_in_lowercase": "x-integration-test" in headers,
                      "authorization_filtered": "authorization" not in headers,
                      "cookie_filtered": "cookie" not in headers,
                      "host_filtered": "host" not in headers,
                      "proxy_authorization_filtered": (
                          "proxy-authorization" not in headers
                      ),
                  }
              )
          EOF

          cat > /tmp/test_request_headers.py << 'EOF'
          import json
          import os

          import httpx

          from tensorlake.applications.remote.api_client import APIClient
          from tensorlake.applications.remote.request import RemoteRequest


          application_name = os.environ["HEADER_APP_NAME"]
          expected_header = "header-reached-application"

          with APIClient() as client:
              endpoint = client.ensure_application_public_endpoint(
                  application_name=application_name,
                  allow=["unauthorized_requests"],
              )
              public_url = next(
                  item.url for item in endpoint.endpoints if item.enabled
              )

              response = httpx.post(
                  public_url,
                  headers={
                      "x-InTeGrAtIoN-tEsT": expected_header,
                      "Authorization": "Bearer must-not-reach-application",
                      "Cookie": "session=must-not-reach-application",
                      "Proxy-Authorization": "Basic must-not-reach-application",
                  },
                  json="input",
                  timeout=30,
              )
              response.raise_for_status()
              request_id = response.json()["request_id"]

              request = RemoteRequest(
                  application_name=application_name,
                  application_manifest=client.application(application_name),
                  request_id=request_id,
                  client=client,
              )
              observed = json.loads(request.output())

          expected = {
              "custom_header": expected_header,
              "custom_header_in_lowercase": True,
              "authorization_filtered": True,
              "cookie_filtered": True,
              "host_filtered": True,
              "proxy_authorization_filtered": True,
          }
          if observed != expected:
              raise AssertionError(
                  f"Unexpected application request headers: {observed!r}"
              )

          print("Verified sanitized request headers in application RequestContext")
          EOF

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-integration-test
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Start Indexify Server
        uses: JarvusInnovations/background-action@v1
        with:
          run: |
            docker run -i -a stdout -a stderr --rm \
              --network host \
              --name indexify-server \
              ${{ steps.login-ecr.outputs.registry }}/indexify-server:latest &
          wait-on: |
            tcp:localhost:8900
          tail: true
          wait-for: 30s
          log-output: true
          log-output-if: true

      - name: Run integration tests in Docker
        run: |
          PYPI_VERSION="${{ inputs.version }}"
          PYPI_VERSION="${PYPI_VERSION/-dev/.dev}"

          docker run --rm \
            --network host \
            -e TENSORLAKE_API_URL="http://localhost:8900" \
            -e TENSORLAKE_API_KEY="${{ secrets.TENSORLAKE_API_KEY }}" \
            -e TENSORLAKE_ONPREM=true \
            -e PYPI_VERSION="${PYPI_VERSION}" \
            -e HEADER_APP_NAME="${HEADER_APP_NAME}" \
            -v /tmp/test_app.py:/tmp/test_app.py \
            -v /tmp/test_request_headers.py:/tmp/test_request_headers.py \
            -v /var/run/docker.sock:/var/run/docker.sock \
            python:3.11-slim bash -c '
              set -e

              echo "--- Installing tensorlake from TestPyPI ---"
              for attempt in $(seq 1 8); do
                if pip install --index-url https://test.pypi.org/simple/ \
                                --extra-index-url https://pypi.org/simple/ \
                                tensorlake==${PYPI_VERSION}; then
                  break
                fi
                if [ "$attempt" -eq 8 ]; then
                  echo "tensorlake==${PYPI_VERSION} still not resolvable on TestPyPI after 8 attempts"
                  exit 1
                fi
                echo "TestPyPI index propagation not caught up yet (attempt ${attempt}/8), retrying in 30s..."
                sleep 30
              done

              echo "--- 1. Build images ---"
              tl build-images /tmp/test_app.py \
                --build-env PIP_INDEX_URL=https://test.pypi.org/simple/ \
                --build-env PIP_EXTRA_INDEX_URL=https://pypi.org/simple/

              echo "--- 2. Deploy ---"
              tl deploy /tmp/test_app.py \
                --build-env PIP_INDEX_URL=https://test.pypi.org/simple/ \
                --build-env PIP_EXTRA_INDEX_URL=https://pypi.org/simple/

              echo "--- 3. Verify public request headers ---"
              python /tmp/test_request_headers.py

              echo "--- All integration tests passed ---"
            '
