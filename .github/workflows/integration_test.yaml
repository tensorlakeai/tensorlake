name: Integration test against TestPyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version of Tensorlake to test
        required: true
  workflow_call:
    inputs:
      version:
        description: Version of Tensorlake to test
        required: true
        type: string

    secrets:
      TENSORLAKE_API_KEY:
        required: true
      TENSORLAKE_API_URL:
        required: true

permissions:
  contents: read

jobs:
  integration-test:
    name: Integration test against TestPyPI
    environment: dev
    runs-on: ubuntu-latest
    steps:
      - name: Write test application
        run: |
          SUFFIX=$(openssl rand -hex 6)
          cat > /tmp/test_app.py << EOF
          from tensorlake.applications import Image, application, function

          image = Image(name="test-image-${SUFFIX}", base_image="python:3.11-slim")

          @application()
          @function(image=image)
          def hello_${SUFFIX}(name: str) -> str:
              return f"Hello, {name}!"
          EOF

      - name: Wait for API server to be ready
        run: |
          echo "Waiting for API server at ${{ secrets.TENSORLAKE_API_URL }} to be ready..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" "${{ secrets.TENSORLAKE_API_URL }}" | grep -q "200"; then
              echo "API server is ready"
              exit 0
            fi
            echo "Attempt $i/30: API server not ready, retrying in 10s..."
            sleep 10
          done
          echo "API server did not become ready in time"
          exit 1

      - name: Run integration tests in Docker
        run: |
          docker run --rm \
            -e TENSORLAKE_API_KEY="${{ secrets.TENSORLAKE_API_KEY }}" \
            -e TENSORLAKE_API_URL="${{ secrets.TENSORLAKE_API_URL }}" \
            -v /tmp/test_app.py:/tmp/test_app.py \
            -v /var/run/docker.sock:/var/run/docker.sock \
            python:3.11-slim bash -c '
              set -e

              echo "--- Installing tensorlake from TestPyPI ---"
              pip install --index-url https://test.pypi.org/simple/ \
                          --extra-index-url https://pypi.org/simple/ \
                          tensorlake==${{ inputs.version }}

              echo "--- 1. Build images ---"
              tl build-images /tmp/test_app.py \
                --build-env PIP_INDEX_URL=https://test.pypi.org/simple/ \
                --build-env PIP_EXTRA_INDEX_URL=https://pypi.org/simple/

              echo "--- 2. Deploy ---"
              tl deploy /tmp/test_app.py \
                --build-env PIP_INDEX_URL=https://test.pypi.org/simple/ \
                --build-env PIP_EXTRA_INDEX_URL=https://pypi.org/simple/

              echo "--- All integration tests passed ---"
            '
