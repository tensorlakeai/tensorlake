name: Tests

on:
  workflow_dispatch:

  push:
    branches:
      - 'main'
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches:
      - 'main'

permissions:
  id-token: write
  contents: read

jobs:
  rust_full_feature_workspace:
    name: Rust full-feature workspace tests
    # The customer CLI feature set needs the private gsvc-mount and gsvc-codec cores, which require
    # access to the artifact_storage repo. Skip on pull requests from forks (they cannot read the
    # App secrets).
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest-xlarge
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-full-feature
          cache-bin: false

      - name: Vendor private artifact_storage crates
        uses: ./.github/actions/vendor-private-crates
        with:
          app-id: ${{ secrets.ARTIFACT_STORAGE_APP_ID }}
          private-key: ${{ secrets.ARTIFACT_STORAGE_APP_PRIVATE_KEY }}

      - name: Build full-feature CLI
        run: cargo build -p tensorlake-cli --features mount,git-clone

      - name: Test private filesystem client engine
        run: |
          CARGO_TARGET_DIR="$PWD/target" cargo clippy --manifest-path crates/gsvc-fs-client/Cargo.toml --all-targets -- -D warnings
          CARGO_TARGET_DIR="$PWD/target" cargo test --manifest-path crates/gsvc-fs-client/Cargo.toml

      - name: Run Rust workspace tests with customer features
        run: cargo test --workspace --features tensorlake-cli/mount,tensorlake-cli/git-clone

  macos_private_source_contract:
    name: macOS private FSKit source contract
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-macos-private-source
          cache-bin: false

      - name: Vendor private artifact_storage crates and FSKit companions
        uses: ./.github/actions/vendor-private-crates
        with:
          app-id: ${{ secrets.ARTIFACT_STORAGE_APP_ID }}
          private-key: ${{ secrets.ARTIFACT_STORAGE_APP_PRIVATE_KEY }}
          include-macos-fskit: "true"

      - name: Verify the CLI and FSKit source contract compile together
        run: >-
          CARGO_TARGET_DIR="$PWD/target"
          cargo test --manifest-path crates/gsvc-fs-client/Cargo.toml
          fskit_close_to_open_tracks_the_daemon_handle_content_version

  windows_build_smoke:
    name: Windows build smoke test
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build tensorlake wheel
        uses: PyO3/maturin-action@v1
        env:
          CARGO_TARGET_DIR: target
        with:
          target: x86_64-pc-windows-msvc
          args: --release --out dist
          sccache: 'true'

      - name: Verify wheel imports Rust Cloud SDK extension
        run: |
          python .github/scripts/verify_wheel.py "dist/tensorlake-*.whl" tensorlake._cloud_sdk tensorlake.cli.deploy --expect-script function-executor --expect-script tensorlake-deploy --reject-script tl --reject-script tensorlake

      - name: Build Node.js native binding
        env:
          CARGO_TARGET_DIR: target
        run: cargo build --release -p tensorlake-rust-cloud-sdk-node --target x86_64-pc-windows-msvc

  run_tests:
    name: Lint and test
    runs-on: ubuntu-latest-xlarge
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: "pip"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-bin
          cache-bin: false

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.0.0
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install, build Rust SDK extension, and lint tensorlake
        run: poetry install --with=dev && make build_cloud_sdk && make check

      - name: Run sandbox/image SDK unit tests
        env:
          PYTHONPATH: src
        run: |
          poetry run python -m unittest \
            tests.sandbox.test_client_rust_backend \
            tests.sandbox.test_client_rust_backend_async \
            tests.sandbox.test_sandbox_rust_backend \
            tests.sandbox.test_sandbox_rust_backend_async \
            tests.sandbox.test_file_systems \
            tests.image.test_sandbox_builder

  test_sandbox:
    name: Sandbox integration tests
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: "pip"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-bin
          cache-bin: false

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.0.0
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install Python dependencies
        run: poetry install --with=dev

      - name: Run Sandbox integration tests
        run: make test_sandbox
        env:
          TENSORLAKE_API_URL: https://api.tensorlake.ai
          TENSORLAKE_API_KEY: ${{ secrets.TENSORLAKE_API_KEY }}
          TENSORLAKE_TEST_CLEANUP_GRACE_SECS: "60"
