name: Tests

on:
  workflow_dispatch:

  push:
    branches:
      - 'main'
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches:
      - 'main'

permissions:
  id-token: write
  contents: read

jobs:
  rust_tests:
    name: Rust workspace tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-bin
          cache-bin: false

      - name: Run Rust workspace tests
        run: cargo test --workspace

  windows_build_smoke:
    name: Windows build smoke test
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Cloud SDK wheel
        uses: PyO3/maturin-action@v1
        env:
          CARGO_TARGET_DIR: target
        with:
          target: x86_64-pc-windows-msvc
          args: --manifest-path crates/rust-cloud-sdk-py/Cargo.toml --release --out dist-cloud-sdk -i python
          sccache: 'true'

      - name: Bundle Cloud SDK extension into tensorlake wheel
        run: |
          python .github/scripts/bundle_cloud_sdk_wheel.py "dist-cloud-sdk/tensorlake_rust_cloud_sdk-*.whl" src/tensorlake --require-abi3

      - name: Build tensorlake wheel
        uses: PyO3/maturin-action@v1
        env:
          CARGO_TARGET_DIR: target
        with:
          target: x86_64-pc-windows-msvc
          args: --release --out dist
          sccache: 'true'

      - name: Verify wheel imports Rust Cloud SDK extension
        run: |
          python .github/scripts/verify_wheel.py "dist/tensorlake-*.whl" tensorlake._cloud_sdk tensorlake.cli.deploy

      - name: Build Node.js native binding
        env:
          CARGO_TARGET_DIR: target
        run: cargo build --release -p tensorlake-rust-cloud-sdk-node --target x86_64-pc-windows-msvc

  run_tests:
    name: Lint and test
    runs-on: ubuntu-latest-xlarge
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: "pip"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-bin
          cache-bin: false

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.0.0
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Build and lint tensorlake
        run: make build && make check

      - name: Run sandbox/image SDK unit tests
        env:
          PYTHONPATH: src
        run: |
          poetry run python -m unittest \
            tests.sandbox.test_client_rust_backend \
            tests.sandbox.test_client_rust_backend_async \
            tests.sandbox.test_sandbox_rust_backend \
            tests.sandbox.test_sandbox_rust_backend_async \
            tests.image.test_sandbox_builder

  test_sandbox:
    name: Sandbox integration tests
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: "pip"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-bin
          cache-bin: false

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.0.0
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Build tensorlake
        run: make build

      - name: Run Sandbox integration tests
        run: make test_sandbox
        env:
          TENSORLAKE_API_URL: https://api.tensorlake.ai
          TENSORLAKE_API_KEY: ${{ secrets.TENSORLAKE_API_KEY }}
          TENSORLAKE_TEST_CLEANUP_GRACE_SECS: "60"
