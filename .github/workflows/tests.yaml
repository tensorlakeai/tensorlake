name: Tests

on:
  push:
    branches:
      - 'main'
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches:
      - 'main'

permissions:
  id-token: write
  contents: read

env:
  TENSORLAKE_API_URL: http://localhost:8900

jobs:
  rust_tests:
    name: Rust workspace tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run Rust workspace tests
        run: cargo test --workspace

  windows_build_smoke:
    name: Windows build smoke test
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Cloud SDK wheel
        uses: PyO3/maturin-action@v1
        env:
          CARGO_TARGET_DIR: target
        with:
          target: x86_64-pc-windows-msvc
          args: --manifest-path crates/rust-cloud-sdk-py/Cargo.toml --release --out dist-cloud-sdk -i python
          sccache: 'true'

      - name: Bundle Cloud SDK extension into tensorlake wheel
        run: |
          python .github/scripts/bundle_cloud_sdk_wheel.py "dist-cloud-sdk/tensorlake_rust_cloud_sdk-*.whl" src/tensorlake --require-abi3

      - name: Build tensorlake wheel
        uses: PyO3/maturin-action@v1
        env:
          CARGO_TARGET_DIR: target
        with:
          target: x86_64-pc-windows-msvc
          args: --release --out dist
          sccache: 'true'

      - name: Verify wheel imports Rust Cloud SDK extension
        run: |
          python .github/scripts/verify_wheel.py "dist/tensorlake-*.whl" tensorlake._cloud_sdk tensorlake.cli.deploy tensorlake.cli.build_images

  run_tests:
    name: Lint and test
    runs-on: ubuntu-latest-xlarge
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: "pip"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.0.0
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Build and lint tensorlake
        run: make build && make check

      - name: Set up Docker
        uses: docker/setup-docker-action@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-platform-api
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract Indexify Dataplane from container image to host
        run: |
          docker pull ${{ steps.login-ecr.outputs.registry }}/indexify-dataplane:latest
          container_id=$(docker create ${{ steps.login-ecr.outputs.registry }}/indexify-dataplane:latest)
          docker cp $container_id:/indexify/indexify-dataplane /usr/local/bin/indexify-dataplane
          docker rm $container_id
          chmod +x /usr/local/bin/indexify-dataplane

      - name: Start Background Indexify Server in Docker container
        uses: JarvusInnovations/background-action@v1
        with:
          # Storage path must be the same in container and host
          # so the Dataplane can access the local FS blob store.
          # Use the same gid, uid to avoid blob access permission issues.
          run: |
            mkdir -p /tmp/indexify-server-storage/indexify_storage/blobs
            docker run -i -a stdout -a stderr --rm \
              --network host \
              --user "$(id -u):$(id -g)" \
              --name indexify-server \
              -v /tmp/indexify-server-storage:/tmp/indexify-server-storage \
              -w /tmp/indexify-server-storage \
              ${{ steps.login-ecr.outputs.registry }}/indexify-server:latest  &
          wait-on: |
            tcp:localhost:8900
          tail: true
          wait-for: 30s
          log-output: true
          log-output-if: true

      - name: Start Background Indexify Dataplane
        uses: JarvusInnovations/background-action@v1
        with:
          run: |
            export PATH=$(poetry env info --path)/bin:$PATH
            /usr/local/bin/indexify-dataplane &
          wait-on: |
            tcp:localhost:8100
          tail: true
          wait-for: 30s
          log-output: true
          log-output-if: true

      - name: Wait for readiness
        run: |
          serverReady=false
          counter=0
          while [ "$serverReady" != true ]; do
            output=$(curl --silent --fail http://localhost:8900/internal/executors | jq '. | length' 2>/dev/null)
            if [[ $? -eq 0 && "$output" -ge 1 ]]; then
                echo "Server ready with executors."
                serverReady=true
            else
                echo 'Waiting for executors to join server...'
                counter=$((counter+1))
                if [ $counter -gt 6 ]; then
                    echo "Timeout waiting for executors to join server."
                    exit 1
                fi
                sleep 5
            fi
          done

      - name: Run tests
        env:
          TENSORLAKE_API_URL: http://127.0.0.1:8900
        run: make test

  test_sandbox:
    name: Sandbox integration tests
    runs-on: ubuntu-latest-xlarge
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: "pip"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.0.0
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Build tensorlake
        run: make build

      - name: Set up Docker
        uses: docker/setup-docker-action@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-sandbox-tests
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Indexify Dataplane
        run: |
          docker pull ${{ steps.login-ecr.outputs.registry }}/indexify-dataplane:latest
          container_id=$(docker create ${{ steps.login-ecr.outputs.registry }}/indexify-dataplane:latest)
          docker cp $container_id:/indexify/indexify-dataplane /usr/local/bin/indexify-dataplane
          docker rm $container_id
          chmod +x /usr/local/bin/indexify-dataplane

      - name: Start Background Indexify Server in Docker container
        uses: JarvusInnovations/background-action@v1
        with:
          run: |
            mkdir -p /tmp/indexify-server-storage/indexify_storage/blobs
            docker run -i -a stdout -a stderr --rm \
              --network host \
              --user "$(id -u):$(id -g)" \
              --name indexify-server \
              -v /tmp/indexify-server-storage:/tmp/indexify-server-storage \
              -w /tmp/indexify-server-storage \
              ${{ steps.login-ecr.outputs.registry }}/indexify-server:latest  &
          wait-on: |
            tcp:localhost:8900
          tail: true
          wait-for: 30s
          log-output: true
          log-output-if: true

      - name: Create Dataplane config
        run: |
          mkdir -p /tmp/dataplane
          cat > /tmp/dataplane/config.yaml <<'YAML'
          env: local
          server_addr: "http://localhost:8901"
          default_sandbox_image: "docker.io/library/alpine:latest"
          sandbox_driver:
            type: docker
            snapshot_local_dir: "/tmp/dataplane/snapshots"
          http_proxy:
            port: 8902
            listen_addr: "0.0.0.0"
            advertise_address: "127.0.0.1:8902"
          monitoring:
            port: 8903
          state_dir: "/tmp/dataplane/state"
          YAML

      - name: Start Background Indexify Dataplane
        uses: JarvusInnovations/background-action@v1
        with:
          run: |
            /usr/local/bin/indexify-dataplane --config /tmp/dataplane/config.yaml &
          wait-on: |
            tcp:localhost:8902
          tail: true
          wait-for: 30s
          log-output: true
          log-output-if: true

      - name: Wait for readiness
        run: |
          serverReady=false
          counter=0
          while [ "$serverReady" != true ]; do
            output=$(curl --silent --fail http://localhost:8900/internal/executors | jq '. | length' 2>/dev/null)
            if [[ $? -eq 0 && "$output" -ge 1 ]]; then
                echo "Server ready with executors."
                serverReady=true
            else
                echo 'Waiting for dataplane to join server...'
                counter=$((counter+1))
                if [ $counter -gt 6 ]; then
                    echo "Timeout waiting for dataplane to join server."
                    exit 1
                fi
                sleep 5
            fi
          done

      - name: Run Sandbox integration tests
        env:
          TENSORLAKE_API_URL: http://127.0.0.1:8900
        run: |
          set -o pipefail
          make test_sandbox 2>&1 | tee /tmp/sandbox-tests.log

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== Docker containers at failure ==="
          docker ps -a --format 'table {{.ID}}\t{{.Image}}\t{{.Status}}\t{{.Names}}'
          echo ""
          echo "=== Network connections to server ==="
          ss -tnp 'sport = :8900 or dport = :8900' 2>/dev/null || netstat -tnp 2>/dev/null | grep 8900 || true
          echo ""
          echo "=== Sandbox test logs ==="
          cat /tmp/sandbox-tests.log 2>/dev/null || echo "No test logs available"
          echo ""
          echo "=== dmesg OOM check ==="
          sudo dmesg | grep -i "oom\|killed process" | tail -20 || true
