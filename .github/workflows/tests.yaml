name: Tests

on:
  workflow_dispatch:

  push:
    branches:
      - 'main'
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches:
      - 'main'

permissions:
  id-token: write
  contents: read

jobs:
  rust_tests:
    name: Rust workspace tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-bin
          cache-bin: false

      - name: Run Rust workspace tests
        run: cargo test --workspace

  windows_build_smoke:
    name: Windows build smoke test
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Cloud SDK wheel
        uses: PyO3/maturin-action@v1
        env:
          CARGO_TARGET_DIR: target
        with:
          target: x86_64-pc-windows-msvc
          args: --manifest-path crates/rust-cloud-sdk-py/Cargo.toml --release --out dist-cloud-sdk -i python
          sccache: 'true'

      - name: Bundle Cloud SDK extension into tensorlake wheel
        run: |
          python .github/scripts/bundle_cloud_sdk_wheel.py "dist-cloud-sdk/tensorlake_rust_cloud_sdk-*.whl" src/tensorlake --require-abi3

      - name: Build tensorlake wheel
        uses: PyO3/maturin-action@v1
        env:
          CARGO_TARGET_DIR: target
        with:
          target: x86_64-pc-windows-msvc
          args: --release --out dist
          sccache: 'true'

      - name: Verify wheel imports Rust Cloud SDK extension
        run: |
          python .github/scripts/verify_wheel.py "dist/tensorlake-*.whl" tensorlake._cloud_sdk tensorlake.cli.deploy

      - name: Build Node.js native binding
        env:
          CARGO_TARGET_DIR: target
        run: cargo build --release -p tensorlake-rust-cloud-sdk-node --target x86_64-pc-windows-msvc

  run_tests:
    name: Lint and test
    runs-on: ubuntu-latest-xlarge
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: "pip"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-bin
          cache-bin: false

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.0.0
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Build and lint tensorlake
        run: make build && make check

      - name: Run sandbox/image SDK unit tests
        env:
          PYTHONPATH: src
        run: |
          poetry run python -m unittest \
            tests.sandbox.test_client_rust_backend \
            tests.sandbox.test_client_rust_backend_async \
            tests.sandbox.test_sandbox_rust_backend \
            tests.sandbox.test_sandbox_rust_backend_async \
            tests.image.test_sandbox_builder

      - name: Set up Docker
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/setup-docker-action@v4

      - name: Configure AWS credentials
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-platform-api
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract Indexify Dataplane from container image to host
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: |
          docker pull ${{ steps.login-ecr.outputs.registry }}/platform-dataplane:latest
          container_id=$(docker create ${{ steps.login-ecr.outputs.registry }}/platform-dataplane:latest)
          docker cp $container_id:/indexify/platform-dataplane /usr/local/bin/platform-dataplane
          docker rm $container_id
          chmod +x /usr/local/bin/platform-dataplane

      - name: Start Background Indexify Server in Docker container
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: JarvusInnovations/background-action@v1
        with:
          # Storage path must be the same in container and host
          # so the Dataplane can access the local FS blob store.
          # Use the same gid, uid to avoid blob access permission issues.
          run: |
            mkdir -p /tmp/indexify-server-storage/indexify_storage/blobs
            docker run -i -a stdout -a stderr --rm \
              --network host \
              --user "$(id -u):$(id -g)" \
              --name indexify-server \
              -v /tmp/indexify-server-storage:/tmp/indexify-server-storage \
              -w /tmp/indexify-server-storage \
              ${{ steps.login-ecr.outputs.registry }}/indexify-server:latest  &
          wait-on: |
            tcp:localhost:8900
          tail: true
          wait-for: 30s
          log-output: true
          log-output-if: true

      - name: Start Background Indexify Dataplane
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: JarvusInnovations/background-action@v1
        with:
          run: |
            export PATH=$(poetry env info --path)/bin:$PATH
            /usr/local/bin/platform-dataplane &
          wait-on: |
            tcp:localhost:8100
          tail: true
          wait-for: 30s
          log-output: true
          log-output-if: true

      - name: Wait for readiness
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: |
          serverReady=false
          counter=0
          while [ "$serverReady" != true ]; do
            output=$(curl --silent --fail http://localhost:8900/internal/executors | jq '. | length' 2>/dev/null)
            if [[ $? -eq 0 && "$output" -ge 1 ]]; then
                echo "Server ready with executors."
                serverReady=true
            else
                echo 'Waiting for executors to join server...'
                counter=$((counter+1))
                if [ $counter -gt 6 ]; then
                    echo "Timeout waiting for executors to join server."
                    exit 1
                fi
                sleep 5
            fi
          done

      - name: Run tests
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          TENSORLAKE_API_URL: http://127.0.0.1:8900
        run: make test

  test_sandbox:
    name: Sandbox integration tests
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: "pip"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-bin
          cache-bin: false

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.0.0
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Build tensorlake
        run: make build

      - name: Run Sandbox integration tests
        run: make test_sandbox
        env:
          TENSORLAKE_API_URL: https://api.tensorlake.ai
          TENSORLAKE_API_KEY: ${{ secrets.TENSORLAKE_API_KEY }}
          TENSORLAKE_TEST_CLEANUP_GRACE_SECS: "60"
