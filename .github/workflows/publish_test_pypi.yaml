name: Release - Python SDK (TestPyPI)

run-name: "Release - Python SDK (TestPyPI) · ${{ github.ref_name }} · @${{ github.actor }}"

on:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

jobs:
  prepare:
    name: Generate dev version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate dev version
        id: version
        run: |
          base=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=${base}-dev$(date +%s)" >> $GITHUB_OUTPUT

  build-sdist:
    needs: [prepare]
    name: Build source distribution
    runs-on: namespace-profile-rust-builder-amd64
    steps:
      - uses: actions/checkout@v4

      - name: Bump version
        run: python .github/scripts/bump_version.py ${{ needs.prepare.outputs.version }}

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  build-wheels:
    needs: [prepare]
    name: Build wheels on ${{ matrix.platform.os }} (${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: namespace-profile-rust-builder-amd64
            target: x86_64
            manylinux: auto
            cloud_sdk_interpreter: /opt/python/cp310-cp310/bin/python
          - os: namespace-profile-rust-builder-amd64
            target: aarch64
            manylinux: auto
            cloud_sdk_interpreter: python3
          - os: macos-14
            target: aarch64
            cloud_sdk_interpreter: python3.10
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cloud_sdk_interpreter: python
    steps:
      - uses: actions/checkout@v4

      - name: Bump version
        run: python .github/scripts/bump_version.py ${{ needs.prepare.outputs.version }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Rust build artifacts (macOS)
        if: runner.os == 'macOS'
        uses: Swatinem/rust-cache@v2

      - name: Build Cloud SDK wheel
        uses: PyO3/maturin-action@v1
        env:
          # ring's AArch64 assembly requires __ARM_ARCH; manylinux2014 cross GCC 4.8 doesn't define it.
          CFLAGS_aarch64_unknown_linux_gnu: ${{ runner.os == 'Linux' && matrix.platform.target == 'aarch64' && '-D__ARM_ARCH=8' || '' }}
          CARGO_TARGET_DIR: target
        with:
          target: ${{ matrix.platform.target }}
          args: --manifest-path crates/rust-cloud-sdk-py/Cargo.toml --release --out dist-cloud-sdk -i ${{ matrix.platform.cloud_sdk_interpreter }}
          manylinux: ${{ matrix.platform.manylinux || 'auto' }}
          sccache: 'true'

      - name: Bundle Cloud SDK extension into tensorlake wheel
        run: |
          python .github/scripts/bundle_cloud_sdk_wheel.py "dist-cloud-sdk/tensorlake_rust_cloud_sdk-*.whl" src/tensorlake --require-abi3

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          # ring's AArch64 assembly requires __ARM_ARCH; manylinux2014 cross GCC 4.8 doesn't define it.
          CFLAGS_aarch64_unknown_linux_gnu: ${{ runner.os == 'Linux' && matrix.platform.target == 'aarch64' && '-D__ARM_ARCH=8' || '' }}
          CARGO_TARGET_DIR: target
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          manylinux: ${{ matrix.platform.manylinux || 'auto' }}
          sccache: 'true'

      - name: Verify wheel imports Rust Cloud SDK extension
        if: ${{ !(runner.os == 'Linux' && matrix.platform.target == 'aarch64') }}
        run: |
          python .github/scripts/verify_wheel.py "dist/tensorlake-*.whl" tensorlake._cloud_sdk tensorlake.cli.deploy tensorlake.cli.build_images

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.os }}-${{ matrix.platform.target }}
          path: dist

  publish:
    name: Publish to TestPyPI
    needs: [build-sdist, build-wheels]
    runs-on: ubuntu-latest
    environment:
      name: test-pypi
      url: https://test.pypi.org/p/tensorlake
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          repository-url: https://test.pypi.org/legacy/
          attestations: false

  wait-for-propagation:
    name: Wait for TestPyPI propagation
    needs: [publish]
    runs-on: ubuntu-latest
    steps:
      - name: Sleep 60s for TestPyPI index propagation
        run: sleep 60

  integration-test:
    name: Integration test against TestPyPI
    needs: [wait-for-propagation, prepare]
    uses: ./.github/workflows/integration_test.yaml
    with:
      version: ${{ needs.prepare.outputs.version }}
    secrets: inherit
