name: Release Tensorlake SDK package to TestPyPi.

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write
  actions: write
  packages: write

jobs:
  build-sdist:
    name: Build source distribution
    runs-on: namespace-profile-rust-builder-amd64
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from pyproject.toml
        id: version
        run: |
          version=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  build-wheels:
    name: Build wheels on ${{ matrix.platform.os }} (${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: namespace-profile-rust-builder-amd64
            target: x86_64
            manylinux: auto
            cloud_sdk_interpreter: /opt/python/cp310-cp310/bin/python
          - os: namespace-profile-rust-builder-amd64
            target: aarch64
            manylinux: auto
            cloud_sdk_interpreter: python3
          - os: macos-15-intel
            target: x86_64
            cloud_sdk_interpreter: python3.10
          - os: macos-14
            target: aarch64
            cloud_sdk_interpreter: python3.10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Rust build artifacts (macOS)
        if: runner.os == 'macOS'
        uses: Swatinem/rust-cache@v2

      - name: Build Cloud SDK wheel
        uses: PyO3/maturin-action@v1
        env:
          # ring's AArch64 assembly requires __ARM_ARCH; manylinux2014 cross GCC 4.8 doesn't define it.
          CFLAGS_aarch64_unknown_linux_gnu: ${{ runner.os == 'Linux' && matrix.platform.target == 'aarch64' && '-D__ARM_ARCH=8' || '' }}
        with:
          target: ${{ matrix.platform.target }}
          args: --manifest-path crates/rust-cloud-sdk-py/Cargo.toml --release --out dist-cloud-sdk -i ${{ matrix.platform.cloud_sdk_interpreter }}
          manylinux: ${{ matrix.platform.manylinux || 'auto' }}
          sccache: 'true'

      - name: Bundle Cloud SDK extension into tensorlake wheel
        run: |
          python - <<'PY'
          from pathlib import Path
          import zipfile

          out_dir = Path("src/tensorlake")
          for pattern in ("_cloud_sdk*.so", "_cloud_sdk*.pyd"):
              for path in out_dir.glob(pattern):
                  path.unlink()

          wheel = next(Path("dist-cloud-sdk").glob("tensorlake_rust_cloud_sdk-*.whl"))
          if "abi3" not in wheel.name:
              raise RuntimeError(
                  f"Cloud SDK wheel must be abi3 for Python 3.10+ compatibility, got: {wheel.name}"
              )
          with zipfile.ZipFile(wheel) as zf:
              members = [
                  m
                  for m in zf.namelist()
                  if Path(m).name.startswith("_cloud_sdk")
                  and (m.endswith(".so") or m.endswith(".pyd"))
              ]
              if len(members) != 1:
                  raise RuntimeError(f"Expected exactly one _cloud_sdk extension in {wheel}, got {members}")
              member = members[0]
              target = out_dir / Path(member).name
              target.write_bytes(zf.read(member))
              print(f"Bundled {member} -> {target}")
          PY

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          # ring's AArch64 assembly requires __ARM_ARCH; manylinux2014 cross GCC 4.8 doesn't define it.
          CFLAGS_aarch64_unknown_linux_gnu: ${{ runner.os == 'Linux' && matrix.platform.target == 'aarch64' && '-D__ARM_ARCH=8' || '' }}
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          manylinux: ${{ matrix.platform.manylinux || 'auto' }}
          sccache: 'true'

      - name: Verify wheel imports Rust Cloud SDK extension
        if: ${{ !(runner.os == 'Linux' && matrix.platform.target == 'aarch64') }}
        run: |
          python -m venv /tmp/wheel-verify
          source /tmp/wheel-verify/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/tensorlake-*.whl
          python - <<'PY'
          import tensorlake._cloud_sdk
          print("Imported tensorlake._cloud_sdk successfully")
          PY

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.os }}-${{ matrix.platform.target }}
          path: dist

  publish:
    name: Publish to TestPyPI
    needs: [build-sdist, build-wheels]
    runs-on: ubuntu-latest
    environment:
      name: test-pypi
      url: https://test.pypi.org/p/tensorlake
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          repository-url: https://test.pypi.org/legacy/

  integration-test:
    name: Integration test against TestPyPI
    needs: [publish, build-sdist]
    uses: ./.github/workflows/integration_test.yaml
    with:
      version: ${{ needs.build-sdist.outputs.version }}
    secrets:
      TENSORLAKE_API_KEY: ${{ secrets.TENSORLAKE_API_KEY }}
      TENSORLAKE_API_URL: ${{ secrets.TENSORLAKE_API_URL }}
