name: Release - TypeScript SDK (npm)

run-name: "Release - TypeScript SDK (npm) · ${{ github.ref_name }} · @${{ github.actor }}"

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

defaults:
  run:
    working-directory: typescript

jobs:
  build-sdk-and-test:
    name: Build SDK and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: typescript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build SDK
        run: npm run build:sdk

      - name: Upload SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-dist
          path: typescript/dist

  build-cli-binaries:
    name: Build CLI binaries (${{ matrix.target_id }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_id: linux-x64
          - os: ubuntu-24.04-arm
            target_id: linux-arm64
          - os: macos-14
            target_id: darwin-arm64
          - os: windows-latest
            target_id: win32-x64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: typescript/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-bin
          cache-bin: false

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build:cli

      - name: Verify packaged CLI binary
        run: node ./bin/tl.cjs --help

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target_id }}
          path: typescript/dist/bin/${{ matrix.target_id }}

  build-native-binaries:
    name: Build native binding (${{ matrix.target_id }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_id: linux-x64
          - os: ubuntu-24.04-arm
            target_id: linux-arm64
          - os: macos-14
            target_id: darwin-arm64
          - os: windows-latest
            target_id: win32-x64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: typescript/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-bin
          cache-bin: false

      - name: Install dependencies
        run: npm ci

      - name: Build native binding
        run: npm run build:native

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target_id }}
          path: typescript/dist/native/${{ matrix.target_id }}

  publish:
    name: Publish to npm
    needs:
      - build-sdk-and-test
      - build-cli-binaries
      - build-native-binaries
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/tensorlake
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Download SDK artifact
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: typescript/dist

      - name: Download Linux CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: cli-linux-x64
          path: typescript/dist/bin/linux-x64

      - name: Download Linux arm64 CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: cli-linux-arm64
          path: typescript/dist/bin/linux-arm64

      - name: Download macOS arm64 CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: cli-darwin-arm64
          path: typescript/dist/bin/darwin-arm64

      - name: Download Windows x64 CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: cli-win32-x64
          path: typescript/dist/bin/win32-x64

      - name: Download Linux native artifact
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x64
          path: typescript/dist/native/linux-x64

      - name: Download Linux arm64 native artifact
        uses: actions/download-artifact@v4
        with:
          name: native-linux-arm64
          path: typescript/dist/native/linux-arm64

      - name: Download macOS arm64 native artifact
        uses: actions/download-artifact@v4
        with:
          name: native-darwin-arm64
          path: typescript/dist/native/darwin-arm64

      - name: Download Windows x64 native artifact
        uses: actions/download-artifact@v4
        with:
          name: native-win32-x64
          path: typescript/dist/native/win32-x64

      - name: Restore executable bits for Unix CLI binaries
        run: find dist/bin -type f ! -name "*.exe" -exec chmod 755 {} +

      - name: Verify package contents
        run: npm pack --dry-run --ignore-scripts

      - name: Publish to npm
        run: npm publish --access public --ignore-scripts
