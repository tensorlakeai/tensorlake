syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "tensorlake/function_executor/proto/status.proto";

package function_executor_service;

// The standard Empty message.
message Empty {}

enum SerializedObjectEncoding {
    SERIALIZED_OBJECT_ENCODING_UNKNOWN = 0;
    SERIALIZED_OBJECT_ENCODING_UTF8_JSON = 1;
    SERIALIZED_OBJECT_ENCODING_UTF8_TEXT = 2;
    SERIALIZED_OBJECT_ENCODING_BINARY_PICKLE = 3;
    SERIALIZED_OBJECT_ENCODING_BINARY_ZIP = 4;
    SERIALIZED_OBJECT_ENCODING_RAW = 5;
}

message SerializedObjectManifest {
    optional SerializedObjectEncoding encoding = 1;
    optional uint64 encoding_version = 2;
    // Includes data and metadata.
    optional uint64 size = 3;
    // Metadata is stored before the actual data.
    optional uint64 metadata_size = 4;
    // Includes data and metadata.
    optional string sha256_hash = 5;
    // MIME type. Only set when raw encoding is used.
    optional string content_type = 6;
    // ID of the function call that returned this SO as it's return value.
    // SOs which are not a function call return value, don't have this field set.
    optional string source_function_call_id = 7;
}

// Full serialized object with all its data.
message SerializedObject {
    optional SerializedObjectManifest manifest = 1;
    optional bytes data = 2;
}

// A chunk of a BLOB in a BLOB store.
message BLOBChunk {
    // URI of the chunk.
    // S3 URI if the data is stored in S3.
    // Starts with "file://"" prefix if the data is stored on a local file system.
    optional string uri = 1;
    // Actual size of chunk data if the BLOB has data.
    // Requested chunk size if the BLOB has no data yet (can be used for data upload).
    optional uint64 size = 2;
    // None if the BLOB has data.
    // ETag of the chunk data (generated by BLOB store) if the BLOB chunk was used to upload data.
    optional string etag = 3;
}

// A BLOB in a BLOB store.
message BLOB {
    // ID of the BLOB, unique per allocation.
    optional string id = 1;
    // Ordered chunks of the BLOB if the BLOB has data.
    // Ordered chunks of the BLOB that can be used to upload data if the BLOB has no data yet.
    repeated BLOBChunk chunks = 2;
}

// Serialized object stored inside a BLOB.
// The BLOB is determined from the protocol context.
message SerializedObjectInsideBLOB {
    optional SerializedObjectManifest manifest = 1;
    // Offset inside the BLOB where the serialized object data starts.
    optional uint64 offset = 2;
}

message FunctionRef {
  optional string namespace = 1;
  optional string application_name = 2;
  optional string function_name = 3;
  optional string application_version = 4;
}

// InitializeRequest contains information about the function
// that Function Executor is going to run the allocation for.
message InitializeRequest {
    optional FunctionRef function = 1;
    optional SerializedObject application_code = 2;
}

enum InitializationOutcomeCode {
    INITIALIZATION_OUTCOME_CODE_UNKNOWN = 0;
    INITIALIZATION_OUTCOME_CODE_SUCCESS = 1;
    INITIALIZATION_OUTCOME_CODE_FAILURE = 2;
}

enum InitializationFailureReason {
    INITIALIZATION_FAILURE_REASON_UNKNOWN = 0;
    INITIALIZATION_FAILURE_REASON_INTERNAL_ERROR = 1;
    INITIALIZATION_FAILURE_REASON_FUNCTION_ERROR = 2;
}

message InitializeResponse {
    optional InitializationOutcomeCode outcome_code = 1;
    optional InitializationFailureReason failure_reason = 2;
}

message ListAllocationsRequest {}

message ListAllocationsResponse {
  repeated Allocation allocations = 1;
}

message Metrics {
    // TODO: Delete the Metrics message once Executor stops using it.
}

enum AllocationOutcomeCode {
    ALLOCATION_OUTCOME_CODE_UNKNOWN = 0;
    ALLOCATION_OUTCOME_CODE_SUCCESS = 1;
    ALLOCATION_OUTCOME_CODE_FAILURE = 2;
}

enum AllocationFailureReason {
    ALLOCATION_FAILURE_REASON_UNKNOWN = 0;
    ALLOCATION_FAILURE_REASON_INTERNAL_ERROR = 1;
    ALLOCATION_FAILURE_REASON_FUNCTION_ERROR = 2;
    ALLOCATION_FAILURE_REASON_REQUEST_ERROR = 3;
    ALLOCATION_FAILURE_REASON_REPLAY_EVENT_HISTORY_MISMATCH = 4;
}

message AllocationProgress {
    float current = 1;
    float total = 2;
}

message AllocationOutputBLOBRequest {
    // ID of the BLOB in AllocationState, unique per allocation.
    // New BLOB requests are detected by comparing IDs.
    optional string id = 1;
    optional uint64 size = 2;
}

message AllocationRequestStatePrepareReadOperation {}

message AllocationRequestStatePrepareWriteOperation {
    optional uint64 size = 1;
}

message AllocationRequestStateCommitWriteOperation {
    // BLOB with the uploaded data.
    optional BLOB blob = 1;
}

message AllocationRequestStateOperation {
    // ID of the operation in AllocationState, unique per allocation.
    // New operations are detected by comparing IDs.
    optional string operation_id = 1;
    optional string state_key = 2;
    oneof operation {
        AllocationRequestStatePrepareReadOperation prepare_read = 3;
        AllocationRequestStatePrepareWriteOperation prepare_write = 4;
        AllocationRequestStateCommitWriteOperation commit_write = 5;
    }
}

// AllocationState contains the current state of the allocation wrt
// dataplane services an allocation might use during its execution.
// FE updates the state while indexify-dataplane reconciles the state
// and performs necessary operations like creating BLOBs.
message AllocationState {
    // Optional current allocation progress.
    optional AllocationProgress progress = 1;
    // Requests for writable BLOBs so allocation can upload data there.
    repeated AllocationOutputBLOBRequest output_blob_requests = 2;
    // Request state operations.
    repeated AllocationRequestStateOperation request_state_operations = 7;
    // Required state hash.
    optional string sha256_hash = 6;
}

// FunctionInputs contains the input data for allocation execution
message FunctionInputs {
    // Values for function call arguments of function calls created by SDK.
    // For application function calls, always only one arg which is oneof:
    // - HTTP request body (SerializedObject content_type is original content-type of the body from HTTP request header).
    // - HTTP request in HTTP 1.1 format (SerializedObject content_type is "message/http").
    repeated SerializedObjectInsideBLOB args = 1;
    // Each arg has a matching BLOB.
    repeated BLOB arg_blobs = 2;
    // BLOB where to upload request error message if allocation fails with request error.
    optional BLOB request_error_blob = 3;
    // SDK metadata for function calls created by SDK.
    // Empty byte array for application function calls.
    optional bytes function_call_metadata = 4;
}

message FunctionArg {
  oneof source {
    // Data dependency reference to another function call.
    string function_call_id = 1;
    // Stored inside uploaded_function_outputs_blob or args_blob.
    SerializedObjectInsideBLOB value = 2;
  }
}

message FunctionCall {
    optional string id = 1;
    optional FunctionRef target = 2;
    repeated FunctionArg args = 3;
    optional bytes call_metadata = 4;
}


message ExecutionPlanUpdate {
  oneof op {
    FunctionCall function_call = 10;
  }
}

message ExecutionPlanUpdates {
  repeated ExecutionPlanUpdate updates = 1;
  optional string root_function_call_id = 2;
  // Optional timestamp for when to start the plan execution.
  optional google.protobuf.Timestamp start_at = 3;
}

enum ReplayMode {
    // Initial run, no replay
    REPLAY_MODE_NONE = 0;
    // Deterministic replay, fail on mismatch.
    // All events that caused the previous run failure are deleted from
    // the function call event log so they'll be re-executed.
    REPLAY_MODE_STRICT = 1;
    // Replay what matches, re-execute on divergence.
    // All events in the function call event log are deleted.
    // Results of deleted events are still stored on Server side to avoid
    // re-execution of matched events.
    REPLAY_MODE_ADAPTIVE = 2;
}

// Allocation represents an allocation with its metadata and execution result
message Allocation {
    optional string request_id = 1;
    optional string function_call_id = 2;
    optional string allocation_id = 3;
    optional FunctionInputs inputs = 4;
    // If set, replays until end of the allocation event log.
    optional ReplayMode replay_mode = 10;
}

message CreateAllocationRequest {
    optional Allocation allocation = 1;
}

message WatchAllocationStateRequest {
    optional string allocation_id = 1;
}

message DeleteAllocationRequest {
    optional string allocation_id = 1;
}

message AllocationOutputBLOB {
    optional google.rpc.Status status = 1;
    // Set if status is OK.
    optional BLOB blob = 2;
}

message AllocationRequestStatePrepareReadOperationResult {
    // A readable BLOB with the value of the requested key.
    // Reading the BLOB will fail if the state key doesn't exist.
    optional BLOB blob = 1;
}

message AllocationRequestStatePrepareWriteOperationResult {
    // A writable BLOB where the allocation can upload the value for the requested key.
    optional BLOB blob = 1;
}

message AllocationRequestStateCommitWriteOperationResult {}

message AllocationRequestStateOperationResult {
    optional string operation_id = 1;
    optional google.rpc.Status status = 3;
    // result is set if status is OK.
    oneof result {
        AllocationRequestStatePrepareReadOperationResult prepare_read = 4;
        AllocationRequestStatePrepareWriteOperationResult prepare_write = 5;
        AllocationRequestStateCommitWriteOperationResult commit_write = 6;
    }
}

message AllocationUpdate {
    // Target allocation ID.
    optional string allocation_id = 1;
    oneof update {
        AllocationOutputBLOB output_blob = 4;
        AllocationRequestStateOperationResult request_state_operation_result = 5;
    }
}

// === Allocation Execution Log ===
//
// Execution events describe what happened in the allocation while executing its function call.
// These are the proto-level representations of AllocationEventLoop output events.

// An execution event describing a function call creation by the allocation's user code.
message AllocationExecutionEventCreateFunctionCall {
    // function_call_id is updates.root_function_call_id.
    optional ExecutionPlanUpdates updates = 1;
    // BLOB where serialized function arguments from updates are stored.
    // SerializedObjectInsideBLOB args in updates reference offsets within this BLOB.
    // Optional, not set if no function arguments in updates.
    optional BLOB args_blob = 2;
}

// An execution event describing a user code side failure while creating a function call.
message AllocationExecutionEventFunctionCallCreationFailed {
    optional string function_call_id = 1;
    // SDK metadata for function call creation error.
    optional bytes metadata = 2;
}

// An execution event describing a function call watcher creation by the allocation's user code.
// The watcher means the user code is blocked waiting for the watched function call to finish.
message AllocationExecutionEventCreateFunctionCallWatcher {
    // ID of the function call to watch.
    optional string function_call_id = 1;
    // Optional deadline for the watcher. The watcher times out if the function call
    // doesn't finish before the deadline.
    optional google.protobuf.Timestamp deadline = 2;
}

// An execution event describing the allocation finishing.
// This is the last event in the execution log. No further events are produced after this.
message AllocationExecutionEventFinishAllocation {
    optional AllocationOutcomeCode outcome_code = 1;
    optional AllocationFailureReason failure_reason = 2;
    oneof outputs {
        // Serialized return value. Stored inside uploaded_function_outputs_blob.
        SerializedObjectInsideBLOB value = 3;
        // Tail function call id if tail call.
        string tail_call_durable_id = 4;
    }
    // BLOB with uploaded function outputs, set when value output is present.
    optional BLOB uploaded_function_outputs_blob = 5;
    // Serialized request error payload if allocation failed with request error.
    // Stored inside uploaded_request_error_blob.
    optional SerializedObjectInsideBLOB request_error_output = 6;
    // BLOB with uploaded request error output, if any.
    optional BLOB uploaded_request_error_blob = 7;
    // TODO: add a field with allocation event clock that caused the allocation to fail.
    // This allows Server to reset the allocation event log to the event right before the
    // one causing the failure before doing a replay. So the failed operation that caused
    // the failure gets re-tried. See:
    // https://www.notion.so/tensorlake/UX-of-durable-execution-error-handling-and-replay-31ba5404295580b684f4f8be38eb4feb.
}

// A single execution event in the allocation execution log.
message AllocationExecutionEvent {
    oneof event {
        AllocationExecutionEventCreateFunctionCall create_function_call = 1;
        AllocationExecutionEventFunctionCallCreationFailed function_call_creation_failed = 2;
        AllocationExecutionEventCreateFunctionCallWatcher create_function_call_watcher = 3;
        AllocationExecutionEventFinishAllocation finish_allocation = 4;
    }
}

message GetAllocationExecutionLogBatchRequest {
    optional string allocation_id = 1;
}

message GetAllocationExecutionLogBatchResponse {
    repeated AllocationExecutionEvent events = 1;
}

message AdvanceAllocationExecutionLogBatchRequest {
    optional string allocation_id = 1;
}

// === Allocation Event Log ===
//
// Allocation events describe what happened in the request and possibly in the whole world
// that is relevant for the allocation. These are the proto-level representations of
// AllocationEventLoop input events.

// An event notifying that a function call has been created on the server (or failed to create).
message AllocationEventFunctionCallCreated {
    // ID of the function call that was created.
    optional string function_call_id = 1;
    // OK if the function call was created successfully.
    optional google.rpc.Status status = 2;
    // This is the same metadata that the FE/SDK sent when requesting the function call creation
    // and when sending AllocationExecutionEventFunctionCallCreationFailed.
    optional bytes metadata = 3;
}

message AllocationEventFunctionCallWatcherCreated {
    // ID of the function call the watcher is for.
    optional string function_call_id = 1;
    // OK if the function call watcher was created successfully.
    optional google.rpc.Status status = 2;
}

enum FunctionCallWatcherStatus {
    FUNCTION_CALL_WATCHER_STATUS_UNKNOWN = 0;
    FUNCTION_CALL_WATCHER_STATUS_COMPLETED = 1;
    // Watcher timed out, the function call is still running.
    FUNCTION_CALL_WATCHER_STATUS_TIMEDOUT = 2;
}

// An event delivering the result of a watched function call.
message AllocationEventFunctionCallWatcherResult {
    // ID of the function call that completed.
    optional string function_call_id = 1;
    optional AllocationOutcomeCode outcome_code = 2;
    optional FunctionCallWatcherStatus watcher_status = 3;
    // Set on success: serialized return value stored inside value_blob.
    optional SerializedObjectInsideBLOB value_output = 4;
    optional BLOB value_blob = 5;
    // Set on request error: serialized request error stored inside request_error_blob.
    optional SerializedObjectInsideBLOB request_error_output = 6;
    optional BLOB request_error_blob = 7;
}

// A single event in the allocation event log.
message AllocationEvent {
    // Monotonical logical clock for ordering of events. Not continuous.
    optional uint64 clock = 1;
    oneof event {
        AllocationEventFunctionCallCreated function_call_created = 2;
        AllocationEventFunctionCallWatcherCreated function_call_watcher_created = 3;
        AllocationEventFunctionCallWatcherResult function_call_watcher_result = 4;
    }
}

// FE sends a read request to say what event it needs next.
// indexify-dataplane streams these requests via watch_allocation_event_log_reads.
message ReadAllocationEventLogRequest {
    optional string allocation_id = 1;
    optional uint64 after_clock = 2; // 0 is the beginning of the log
    optional uint32 max_entries = 3; // Pagination limit
}

// Response to a ReadAllocationEventLogRequest, containing the requested event.
message ReadAllocationEventLogResponse {
    optional string allocation_id = 1;
    repeated AllocationEvent entries = 2;
    // Clock of the last returned entry.
    optional uint64 last_clock = 3;
    // True if more entries exist after last_clock.
    optional bool has_more = 4;
}

message WatchAllocationEventLogReads {
    optional string allocation_id = 1;
}

message HealthCheckRequest {}

message HealthCheckResponse {
    optional bool healthy = 1;
    optional string status_message = 2;
}

message InfoRequest {}

message InfoResponse {
    // Internal version of this Function Executor.
    // Semantic versioning schema is used with format 0.0.0.
    // Used to support migrations.
    optional string version = 1;
    // The version of the SDK used in this Function Executor to run customer code.
    optional string sdk_version = 2;
    // The language of the SDK. Currently supported values:
    // - "python"
    optional string sdk_language = 3;
    // The version of the SDK language. The language's versioning format is used.
    optional string sdk_language_version = 4;
}

service FunctionExecutor {
    // Initializes the Function Executor to run allocations
    // for a particular function. This method is called only
    // once per Function Executor as it can only run a single function.
    // It should be called before calling create_allocation.
    rpc initialize(InitializeRequest) returns (InitializeResponse);
    // Lists the currently-running allocations.
    rpc list_allocations(ListAllocationsRequest) returns (ListAllocationsResponse);
    // Creates and starts the allocation specified in the request.
    rpc create_allocation(CreateAllocationRequest) returns (Empty);
    // Deletes the allocation. The allocation must be finished before calling this method.
    rpc delete_allocation(DeleteAllocationRequest) returns (Empty);

    // Allocation state RPCs. Only used for indexify-dataplane services.
    //
    // Streams updates of the allocation state until allocation finishes.
    // If allocation is finished, streams the final state and closes the stream.
    rpc watch_allocation_state(WatchAllocationStateRequest) returns (stream AllocationState);
    // Send an update to an allocation.
    rpc send_allocation_update(AllocationUpdate) returns (Empty);

    // Allocation execution and event log protocol is available for FEs starting from version 0.1.3.

    // Allocation execution log. Allocation execution log is a strictly ordered append only sequence of events
    // describing what happened in the allocation while executing its function call. If the user code in the function call
    // is deterministic then its allocation execution log is the same across different allocation runs of the same
    // function call.
    //
    // Returns current allocation execution log batch. Blocks if there is no log batch yet.
    // Each batch only contains closely related execution events, i.e. all function calls of a map operation.
    rpc get_allocation_execution_log_batch(GetAllocationExecutionLogBatchRequest) returns (GetAllocationExecutionLogBatchResponse);
    // Advances the current allocation execution log batch to the next one.
    rpc advance_allocation_execution_log_batch(AdvanceAllocationExecutionLogBatchRequest) returns (Empty);

    // Allocation event log. Allocation event log is a strictly ordered append only sequence of all events happening in
    // the request and possibly in the whole world that are relevant for the allocation.
    //
    // Streams allocation event log read requests coming from the FE. Only one stream per allocation is allowed.
    // FE sends one read request at a time. FE doesn't send a new read request until the response for an already
    // sent request gets delivered to it. FE re-sends its pending read request when indexify-dataplane creates the stream.
    rpc watch_allocation_event_log_reads(WatchAllocationEventLogReads) returns (stream ReadAllocationEventLogRequest);
    rpc send_allocation_event_log_read_response(ReadAllocationEventLogResponse) returns (Empty);

    // Health check method to check if the FE is able to run allocations.
    // The FE should be initialized before calling this method.
    rpc check_health(HealthCheckRequest) returns (HealthCheckResponse);
    // Information about this Function Executor.
    rpc get_info(InfoRequest) returns (InfoResponse);
}
