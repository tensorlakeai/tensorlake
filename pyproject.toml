[project]
name = "tensorlake"
version = "0.4.8"
description = "Tensorlake SDK for Document Ingestion API and Serverless Applications"
readme = "README.md"
authors = [{ name = "Tensorlake Inc.", email = "support@tensorlake.ai" }]
requires-python = ">=3.10"
dependencies = [
    "httpx[http2]>=0.27.2,<1.0",
    "pydantic>=2.0,<3.0",
    "httpx-sse>=0.4.1",
    "grpcio>=1.40.0,<2.0.0",
    "grpcio-tools>=1.40.0,<2.0.0",
]

[project.urls]
Homepage = "https://github.com/tensorlakeai/tensorlake"
Repository = "https://github.com/tensorlakeai/tensorlake"

[build-system]
requires = ["maturin>=1.9,<2.0"]
build-backend = "maturin"

[tool.maturin]
bindings = "bin"
manifest-path = "crates/cli/Cargo.toml"
module-name = "tensorlake"
python-source = "src"
data = "tensorlake.data"
include = [{ path = "LICENSE", format = "sdist" }]
strip = true

[tool.black]
extend_exclude = "vendor"

[tool.isort]
profile = "black"
extend_skip = ["vendor"]

[tool.poetry.group.dev.dependencies]
black = "25.11.0"
parameterized = "^0.9.0"
respx = "^0.22.0"
psutil = "^7.2.2"
isort = "^7.0.0"
pre-commit = "^4.5.1"
# Generate .py stubs with old version of grpcio so users can install
# any newer version of grpcio package. grpcio is forward compatible with
# code generated by older grpcio (same major version).
grpcio = "1.60.0"
grpcio-tools = "1.60.0"
# grpcio-tools implicit dependency, have to pin to an old version too.
setuptools = "^69.0.0"
maturin = ">=1.9,<2.0"
